services:
  x-deepagents:
    build: .
    container_name: x-deepagents
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    working_dir: /app
    # 默认启动 HTTP API
    command: ["uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8000"]

